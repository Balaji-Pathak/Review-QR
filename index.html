<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review QR</title>
    <meta
      name="description"
      content="Leave a beautiful Google review after scanning the QR code in the restaurant."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="review-card" aria-labelledby="review-heading">
        <div class="review-card__header">
          <img id="shop-logo" class="brand-logo" src="assets/logo.png" alt="Restaurant logo" />
          <div>
            <h1 id="shop-name" class="brand-name">Loading...</h1>
            <div id="shop-rating-stars" class="rating-stars" aria-label="Restaurant rating"></div>
            <p id="shop-rating-summary" class="rating-summary">Loading reviews...</p>
          </div>
        </div>

        <div class="review-card__body">
          <h2 id="review-heading">Enjoyed your visit?</h2>
          <p id="review-description" class="review-description">
            Your review helps our small business grow and helps future customers make informed decisions.
          </p>

          <label class="field-label" for="review-text">Suggested Review</label>
          <textarea id="review-text" class="review-textarea" spellcheck="false"></textarea>

          <div class="action-row">
            <button id="copy-review" class="btn btn--ghost" type="button">
              <span class="btn__label">Copy Review</span>
            </button>
            <span id="copy-status" class="copy-status" aria-live="polite"></span>
          </div>

          <div class="rating-section">
            <p class="rating-section__label">Rate your experience</p>
            <div id="star-rating" class="star-rating" role="radiogroup" aria-label="Choose a rating"></div>
            <p class="rating-section__hint">This is only visual and does not submit anything.</p>
          </div>

          <a id="google-review-link" class="btn btn--primary" href="#" target="_blank" rel="noopener noreferrer">
            <span class="google-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                <path fill="#fff" d="M21.6 12.23c0-.68-.06-1.34-.17-1.97H12v3.73h5.4a4.62 4.62 0 0 1-2 3.04v2.52h3.24c1.9-1.75 2.99-4.33 2.99-7.32Z"/>
                <path fill="#fff" d="M12 22c2.7 0 4.96-.9 6.62-2.43l-3.24-2.52c-.9.6-2.04.96-3.38.96-2.6 0-4.8-1.76-5.59-4.12H3.07v2.58A10 10 0 0 0 12 22Z"/>
                <path fill="#fff" d="M6.41 13.89A6.02 6.02 0 0 1 6.41 10.1V7.52H3.07a10 10 0 0 0 0 12.74l3.34-2.37Z"/>
                <path fill="#fff" d="M12 6.04c1.47 0 2.79.5 3.83 1.49l2.87-2.87A9.95 9.95 0 0 0 12 2 10 10 0 0 0 3.07 5.52l3.34 2.58C7.2 7.8 9.4 6.04 12 6.04Z"/>
              </svg>
            </span>
            <span>Continue to Google Reviews</span>
          </a>
        </div>

        <footer class="review-card__footer">Powered by NextWebit</footer>
      </section>
    </main>

    <script src="data/shop.js"></script>
    <script src="script.js"></script>
  </body>
</html>
